# One-click deploy config for Render (https://render.com) — free plan.
# Render injects $PORT; app.py already reads it and binds 0.0.0.0.
services:
  - type: web
    name: humiley-portal
    runtime: python
    plan: free
    region: singapore        # closest Render region to Vietnam
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Fresh deploys start clean with just the admin (Microsoft 365 login + sync ready).
      - key: TK_BOOTSTRAP_ADMIN
        value: "1"
      - key: TK_ADMIN_EMAIL
        value: "tony.nguyen@humiley.com"
      - key: TK_ADMIN_NAME
        value: "Tony Nguyen"
