# Humiley Portal — one-command VPS deploy: app behind Caddy (automatic HTTPS).
# Usage on the VPS:  cp .env.example .env  (edit it)  →  docker compose up -d --build
services:
  app:
    build: .
    container_name: humiley_portal
    restart: unless-stopped
    environment:
      - TK_ADMIN_EMAIL=${TK_ADMIN_EMAIL:-tony.nguyen@humiley.com}
      - TK_ADMIN_NAME=${TK_ADMIN_NAME:-Tony Nguyen}
      # Signature-PIN pepper — kept out of the DB so a database leak can't crack PINs offline.
      # Generated once into .env by update.sh; never change it or existing PINs stop verifying.
      - TK_ESIGN_PEPPER=${TK_ESIGN_PEPPER:-}
      # Shared secret for the Procurement single-sign-on handoff (an app of this portal). The
      # portal mints a signed token; procurement verifies it with the SAME value as its
      # PORTAL_SSO_SECRET so a signed-in user opens Procurement with no second login.
      # Generated once into .env by update.sh.
      - TK_SSO_SECRET=${TK_SSO_SECRET:-}
    volumes:
      - humiley_data:/data          # SQLite DB persists here across redeploys
    expose:
      - "8000"                      # internal only — not published to the public interface

  caddy:
    image: caddy:2
    container_name: humiley_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PORTAL_DOMAIN=${PORTAL_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data            # Let's Encrypt certificates persist here
      - caddy_config:/config
    depends_on:
      - app

volumes:
  humiley_data:
  caddy_data:
  caddy_config:
